<!DOCTYPE html>
<html>
<head>
  <title>buat istriii kakaaa 💗</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      background: linear-gradient(to bottom, #ff9a9e, #fad0c4);
      color: white;
      overflow: hidden;
    }

    .box {
      margin-top: 40px;
      padding: 20px;
      animation: fade 2s ease-in-out;
    }

    img {
      width: 80%;
      max-width: 250px;
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
      margin-bottom: 15px;
    }

    h1 {
      font-size: 28px;
      animation: fade 2s;
    }

    p {
      font-size: 18px;
      margin: 5px 0;
      animation: fade 3s;
    }

    button {
      padding: 12px 25px;
      border: none;
      border-radius: 25px;
      background: white;
      color: #ff6f91;
      font-size: 16px;
      cursor: pointer;
      margin: 10px;
      position: relative;
    }

    button:hover {
      background: #ffe4ec;
    }

    @keyframes fade {
      from {opacity: 0;}
      to {opacity: 1;}
    }

    /* hati jatuh */
    .heart {
      position: absolute;
      color: pink;
      font-size: 20px;
      animation: fall linear infinite;
    }

    @keyframes fall {
      0% {transform: translateY(-10vh);}
      100% {transform: translateY(110vh);}
    }
  </style>
</head>

<body>

  <!-- musik langsung ke bagian enak -->
  <iframe id="musik" width="0" height="0"
  src="https://www.youtube.com/embed/Ys7-6_t7OEQ?start=45&autoplay=1&loop=1&playlist=Ys7-6_t7OEQ"
  frameborder="0" allow="autoplay"></iframe>

  <div class="box">
    <h1>buat istriii kakaaa 💗</h1>

    <img src="rahma.png" alt="istriii kakaaa">

    <p>kakaa ga butuh yang sempurna,</p>
    <p>kakaa cuma butuh kamu 😍</p>
    <p>kamu itu rumah buat kakaa,</p>
    <p>tempat kakaa pulang 😢💗</p>

    <button onclick="pesan()">klik ini yaa 💌</button>
    <br>
    <button onclick="playMusic()">putar lagu 🎵</button>
    <br>
    <button id="tombolCinta">jangan pencet 😝</button>
  </div>

  <script>
    function pesan() {
      alert("kakaa sayang banget sama kamu istriii kakaaa, janji jagain kamu sampe akhir 🤩🫂💗");
    }

    function playMusic() {
      var iframe = document.getElementById("musik");
      iframe.src += "&autoplay=1";
    }

    // tombol kabur
    let klik = 0;
    const btn = document.getElementById("tombolCinta");

    btn.addEventListener("click", function() {
      klik++;

      if (klik < 4) {
        let x = Math.random() * (window.innerWidth - 120);
        let y = Math.random() * (window.innerHeight - 60);

        btn.style.position = "absolute";
        btn.style.left = x + "px";
        btn.style.top = y + "px";
      } else {
        document.body.innerHTML = `
          <div style="text-align:center; margin-top:100px;">
            <h1>hehe ketangkep juga 😆💗</h1>
            <p>kakaa ga main-main sama kamu...</p>
            <p>kakaa beneran sayang banget 😭💗</p>
            <h2>jangan pergi yaa istriii kakaaa 🥺</h2>
          </div>
        `;
      }
    });

    // efek hati jatuh
    function createHeart() {
      const heart = document.createElement("div");
      heart.className = "heart";
      heart.innerHTML = "💗";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.animationDuration = (Math.random() * 3 + 2) + "s";
      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 5000);
    }

    setInterval(createHeart, 300);
  </script>

</body>
</html>
