<!DOCTYPE html>
<html>
<head>
  <title>buat istriii kakaaa 💗</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      background: linear-gradient(to bottom, #ff9a9e, #fad0c4);
      color: white;
    }

    .box {
      margin-top: 40px;
      padding: 20px;
      animation: fade 2s ease-in-out;
    }

    img {
      width: 80%;
      max-width: 250px;
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
      margin-bottom: 15px;
    }

    h1 {
      font-size: 28px;
    }

    p {
      font-size: 18px;
      margin: 5px 0;
    }

    button {
      padding: 12px 25px;
      border: none;
      border-radius: 25px;
      background: white;
      color: #ff6f91;
      font-size: 16px;
      cursor: pointer;
      margin: 10px;
    }

    button:hover {
      background: #ffe4ec;
    }

    @keyframes fade {
      from {opacity: 0;}
      to {opacity: 1;}
    }
  </style>
</head>

<body>

  <!-- musik -->
  <iframe id="musik" width="0" height="0"
  src="https://www.youtube.com/embed/Ys7-6_t7OEQ?enablejsapi=1&loop=1&playlist=Ys7-6_t7OEQ"
  frameborder="0" allow="autoplay"></iframe>

  <div class="box">
    <h1>buat istriii kakaaa 💗</h1>

    <img src="rahma.jpg" alt="istriii kakaaa">

    <p>kakaa ga butuh yang sempurna,</p>
    <p>kakaa cuma butuh kamu 🥺</p>
    <p>kamu itu rumah buat kakaa,</p>
    <p>tempat kakaa pulang 😢💗</p>

    <button onclick="pesan()">klik ini yaa 💌</button>
    <br>
    <button onclick="playMusic()">putar lagu 🎵</button>
  </div>

  <script>
    function pesan() {
      alert("kakaa sayang banget sama kamu istriii kakaaa, janji jagain kamu sampe akhir 😭💗");
    }

    function playMusic() {
      var iframe = document.getElementById("musik");
      iframe.src += "&autoplay=1";
    }
  </script>

</body>
</html>
